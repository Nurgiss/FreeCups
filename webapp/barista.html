<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>FreeCups — Barista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <meta name="theme-color" content="#0d0d14" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2a;
      --border: rgba(255,255,255,0.07); --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45); --primary: #7c5cfc; --primary2: #a78bfa;
      --success: #22c55e; --error: #f43f5e;
      --gold: #f5c542; --radius: 20px; --radius-sm: 12px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px; -webkit-font-smoothing: antialiased; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes scanLine { 0%{top:0%} 100%{top:100%} }

    .screen { min-height: 100vh; display: flex; flex-direction: column; animation: fadeUp 0.25s ease both; }
    .hidden { display: none !important; }

    /* ── Login ── */
    .login-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 8px;
    }
    .login-logo { font-size: 52px; margin-bottom: 8px; }
    .login-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .login-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; gap: 12px;
    }
    .input-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .input-field {
      width: 100%; padding: 14px 16px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: var(--primary); }
    .btn-primary {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--primary), #9966ff);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      font-size: 13px; color: var(--error); text-align: center;
      background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25);
      border-radius: var(--radius-sm); padding: 10px;
    }

    /* ── Scanner ── */
    .scanner-page { position: relative; min-height: 100vh; background: #000; }
    .scan-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 52px 16px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
    }
    .scan-header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 42px; height: 42px; background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px); border: none; border-radius: 50%;
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .scan-title { font-size: 18px; font-weight: 700; color: #fff; }
    .shop-badge {
      background: rgba(124,92,252,0.25); border: 1px solid rgba(124,92,252,0.4);
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; font-weight: 700; color: var(--primary2);
    }

    #qr-reader { width: 100% !important; height: 100vh !important; border: none !important; background: #000 !important; }
    #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
    #qr-reader img, #qr-reader__header_message,
    #qr-reader__dashboard, #qr-reader__status_span,
    #qr-reader__camera_selection { display: none !important; }

    .qr-overlay { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .qr-overlay-dark { position: absolute; background: rgba(0,0,0,0.5); }
    .qr-overlay-dark.top    { top:0; left:0; right:0; bottom:calc(50% + 110px); }
    .qr-overlay-dark.bottom { bottom:0; left:0; right:0; top:calc(50% + 110px); }
    .qr-overlay-dark.left   { top:calc(50% - 110px); bottom:calc(50% - 110px); left:0; right:calc(50% + 110px); }
    .qr-overlay-dark.right  { top:calc(50% - 110px); bottom:calc(50% - 110px); right:0; left:calc(50% + 110px); }

    .qr-frame {
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      width: 220px; height: 220px; z-index: 10; pointer-events: none;
    }
    .qr-corner { position: absolute; width: 30px; height: 30px; border-color: #fff; border-style: solid; border-width: 0; }
    .qr-corner.tl { top:0; left:0; border-top-width:3px; border-left-width:3px; border-radius:4px 0 0 0; }
    .qr-corner.tr { top:0; right:0; border-top-width:3px; border-right-width:3px; border-radius:0 4px 0 0; }
    .qr-corner.bl { bottom:0; left:0; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 4px; }
    .qr-corner.br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }
    .qr-scan-line {
      position: absolute; left:0; right:0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--primary2), transparent);
      box-shadow: 0 0 8px var(--primary);
      animation: scanLine 2s linear infinite; z-index: 11;
    }

    .scan-bottom {
      position: absolute; bottom:0; left:0; right:0; z-index: 20;
      padding: 16px 20px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
      text-align: center;
    }
    .scan-hint { font-size: 14px; color: rgba(255,255,255,0.65); font-weight: 500; }

    /* ── Confirm sheet ── */
    .confirm-sheet {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end;
    }
    .confirm-card {
      width: 100%; background: var(--surface);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border);
      padding: 24px 24px 48px;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .confirm-handle {
      width: 36px; height: 4px; background: rgba(255,255,255,0.15);
      border-radius: 99px; margin: 0 auto 20px;
    }
    .confirm-title { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 4px; }
    .confirm-userid { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: monospace; }

    .stamp-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
    .stamp-picker { display: flex; gap: 8px; margin-bottom: 20px; }
    .stamp-opt {
      flex: 1; padding: 14px 0;
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 18px; font-weight: 800; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; text-align: center;
    }
    .stamp-opt.selected {
      border-color: var(--primary); background: rgba(124,92,252,0.15); color: var(--primary2);
    }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 16px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-confirm {
      flex: 2; padding: 16px;
      background: linear-gradient(135deg, var(--primary), #9966ff);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-confirm:active { transform: scale(0.97); }
    .btn-confirm:disabled { opacity: 0.5; }

    /* ── Result ── */
    .result-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 32px; text-align: center;
      animation: fadeUp 0.3s ease;
    }
    .result-emoji { font-size: 72px; }
    .result-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .result-msg { font-size: 15px; color: var(--muted); line-height: 1.5; max-width: 280px; }
    .result-stamps {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 24px;
      display: flex; gap: 20px; margin-top: 8px;
    }
    .result-stat { text-align: center; }
    .result-stat-val { font-size: 28px; font-weight: 800; color: var(--primary2); }
    .result-stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .btn-next {
      margin-top: 12px; padding: 16px 40px;
      background: linear-gradient(135deg, var(--primary), #9966ff);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

<!-- ── Screen 1: Login ──────────────────────────────────────────── -->
<div class="screen" id="screen-login">
  <div class="login-wrap">
    <div class="login-logo">☕</div>
    <div class="login-title">Barista Panel</div>
    <div class="login-sub">FreeCups — Staff access</div>

    <div class="login-card">
      <div class="input-label">Shop password</div>
      <input class="input-field" type="password" id="shop-secret-input"
        placeholder="Enter shop secret" autocomplete="current-password" />
      <div class="login-error hidden" id="login-error"></div>
      <button class="btn-primary" id="login-btn">Enter →</button>
    </div>
  </div>
</div>

<!-- ── Screen 2: Scanner ────────────────────────────────────────── -->
<div class="screen hidden" id="screen-scanner">
  <div class="scanner-page">

    <div class="scan-header">
      <div class="scan-header-left">
        <button class="back-btn" id="logout-btn">←</button>
        <div class="scan-title">Scan customer QR</div>
      </div>
      <div class="shop-badge" id="shop-badge">…</div>
    </div>

    <div id="qr-reader"></div>

    <div class="qr-overlay">
      <div class="qr-overlay-dark top"></div>
      <div class="qr-overlay-dark bottom"></div>
      <div class="qr-overlay-dark left"></div>
      <div class="qr-overlay-dark right"></div>
    </div>
    <div class="qr-frame">
      <div class="qr-corner tl"></div>
      <div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div>
      <div class="qr-corner br"></div>
      <div class="qr-scan-line"></div>
    </div>

    <div class="scan-bottom">
      <div class="scan-hint">Scan customer's QR code from their FreeCups app</div>
    </div>
  </div>
</div>

<!-- ── Confirm sheet (shown after scan) ────────────────────────── -->
<div class="confirm-sheet hidden" id="confirm-sheet">
  <div class="confirm-card">
    <div class="confirm-handle"></div>
    <div class="confirm-title">Add stamps</div>
    <div class="confirm-userid" id="confirm-userid"></div>

    <div class="stamp-label">How many stamps?</div>
    <div class="stamp-picker" id="stamp-picker">
      <button class="stamp-opt selected" data-val="1">1</button>
      <button class="stamp-opt" data-val="2">2</button>
      <button class="stamp-opt" data-val="3">3</button>
    </div>

    <div class="confirm-btns">
      <button class="btn-cancel" id="confirm-cancel">Cancel</button>
      <button class="btn-confirm" id="confirm-ok">
        <span id="confirm-btn-text">Confirm ☕</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Result overlay ───────────────────────────────────────────── -->
<div class="result-overlay hidden" id="result-overlay">
  <div class="result-emoji" id="result-emoji">✅</div>
  <div class="result-title" id="result-title">Done!</div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-stamps">
    <div class="result-stat">
      <div class="result-stat-val" id="res-stamps">0</div>
      <div class="result-stat-lbl">Stamps now</div>
    </div>
    <div class="result-stat" style="border-left:1px solid var(--border); padding-left:20px;">
      <div class="result-stat-val" id="res-free">0</div>
      <div class="result-stat-lbl">Free coffees</div>
    </div>
  </div>
  <button class="btn-next" id="result-next">Scan next customer →</button>
</div>

<script>
  const BACKEND = 'https://api.freecup.begildagallery.com';
  const SHOP_ID = 'shop_main';

  let session = null; // { shopId, shopSecret, shopName }
  let scanner  = null;
  let scanning = false;
  let scanned  = false;
  let selectedStamps = 1;
  let pendingUserId  = null;

  // ── Restore session ────────────────────────────────────────────────────────
  try {
    const saved = localStorage.getItem('barista_session');
    if (saved) {
      session = JSON.parse(saved);
      showScanner();
    }
  } catch {}

  // ── Login ──────────────────────────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('shop-secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const secret = document.getElementById('shop-secret-input').value.trim();
    if (!secret) return;

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Checking…';
    hideEl('login-error');

    try {
      const r = await fetch(`${BACKEND}/barista/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shopId: SHOP_ID, shopSecret: secret }),
      });
      const data = await r.json();

      if (!r.ok) throw new Error(data.error || 'Wrong password');

      session = { shopId: SHOP_ID, shopSecret: secret, shopName: data.shop.name };
      localStorage.setItem('barista_session', JSON.stringify(session));
      showScanner();
    } catch (err) {
      showEl('login-error');
      document.getElementById('login-error').textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Enter →';
    }
  }

  // ── Scanner ────────────────────────────────────────────────────────────────
  function showScanner() {
    hide('screen-login');
    show('screen-scanner');
    document.getElementById('shop-badge').textContent = session?.shopName || '';
    scanned = false;
    startScanner();
  }

  function startScanner() {
    if (scanner) { scanner.clear().catch(() => {}); scanner = null; }
    const el = document.getElementById('qr-reader');
    if (!el) return;

    scanned = false;
    try {
      scanner = new Html5Qrcode('qr-reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 12, qrbox: { width: 220, height: 220 }, aspectRatio: 1 },
        onQrDecoded,
        () => {}
      ).then(() => {
        scanning = true;
        document.getElementById('qr-reader__dashboard')?.remove();
      }).catch(() => {
        alert('Camera access denied. Allow camera and reload.');
      });
    } catch (e) { console.error(e); }
  }

  function onQrDecoded(text) {
    if (scanned) return;
    scanned = true;
    scanner?.pause(true);

    let parsed;
    try { parsed = JSON.parse(text); } catch {
      alert('Invalid QR code. Ask customer to open FreeCups app.');
      scanned = false;
      scanner?.resume();
      return;
    }

    if (!parsed.userId) {
      alert('Not a FreeCups QR code.');
      scanned = false;
      scanner?.resume();
      return;
    }

    // Check expiry
    if (parsed.ts) {
      const age = Date.now() - Number(parsed.ts);
      if (age > 10 * 60 * 1000) {
        alert('QR code expired. Ask customer to refresh their app.');
        scanned = false;
        scanner?.resume();
        return;
      }
    }

    pendingUserId = parsed.userId;
    showConfirm(parsed.userId);
  }

  // ── Confirm ────────────────────────────────────────────────────────────────
  function showConfirm(userId) {
    document.getElementById('confirm-userid').textContent = `Customer ID: ${userId}`;
    selectedStamps = 1;
    document.querySelectorAll('.stamp-opt').forEach(b => {
      b.classList.toggle('selected', b.dataset.val === '1');
    });
    document.getElementById('confirm-btn-text').textContent = 'Confirm ☕';
    document.getElementById('confirm-ok').disabled = false;
    show('confirm-sheet');
  }

  document.getElementById('stamp-picker').addEventListener('click', e => {
    const opt = e.target.closest('.stamp-opt');
    if (!opt) return;
    selectedStamps = parseInt(opt.dataset.val);
    document.querySelectorAll('.stamp-opt').forEach(b =>
      b.classList.toggle('selected', b === opt)
    );
  });

  document.getElementById('confirm-cancel').addEventListener('click', () => {
    hide('confirm-sheet');
    scanned = false;
    scanner?.resume();
  });

  document.getElementById('confirm-ok').addEventListener('click', doConfirm);

  async function doConfirm() {
    const btn = document.getElementById('confirm-ok');
    btn.disabled = true;
    document.getElementById('confirm-btn-text').innerHTML = '<div class="spinner"></div>';

    try {
      const r = await fetch(`${BACKEND}/barista/scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          qrData: JSON.stringify({ userId: pendingUserId, ts: Date.now() }),
          stamps: selectedStamps,
          shopId: session.shopId,
          shopSecret: session.shopSecret,
        }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');

      hide('confirm-sheet');
      showResult(data);
    } catch (err) {
      btn.disabled = false;
      document.getElementById('confirm-btn-text').textContent = 'Confirm ☕';
      alert(err.message);
    }
  }

  // ── Result ─────────────────────────────────────────────────────────────────
  function showResult(data) {
    document.getElementById('result-emoji').textContent = data.freeEarned ? '🎉' : '✅';
    document.getElementById('result-title').textContent = data.freeEarned ? 'Free coffee!' : 'Stamps added!';
    document.getElementById('result-msg').textContent   = data.message;
    document.getElementById('res-stamps').textContent   = data.coffees ?? '—';
    document.getElementById('res-free').textContent     = data.rewards ?? '—';
    show('result-overlay');
  }

  document.getElementById('result-next').addEventListener('click', () => {
    hide('result-overlay');
    scanned = false;
    scanner?.resume();
  });

  // ── Logout ─────────────────────────────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', () => {
    if (!confirm('Log out of barista panel?')) return;
    localStorage.removeItem('barista_session');
    session = null;
    if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
    hide('screen-scanner');
    show('screen-login');
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
  function showEl(el) { if (typeof el === 'string') el = document.getElementById(el); el.classList.remove('hidden'); }
  function hideEl(el) { if (typeof el === 'string') el = document.getElementById(el); el.classList.add('hidden'); }
</script>
</body>
</html>
